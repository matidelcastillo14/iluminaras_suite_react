{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:520px;margin:0 auto;">
  <h2 style="margin:0 0 10px 0;">Cambiar contraseña</h2>
  <p style="margin:0 0 10px 0;font-size:13px;color:#444;">Para continuar, tenés que establecer una nueva contraseña.</p>
  <form method="post" action="{{ url_for('auth.change_password_post') }}">
    <label>Nueva contraseña</label>
    <input type="password" name="password1" minlength="10" required />
    <label>Repetir contraseña</label>
    <input type="password" name="password2" minlength="10" required />
    <div style="margin-top:12px;">
      <button class="btn primary" type="submit">Guardar</button>
    </div>
  </form>
</div>
{% endblock %}

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Restablecer - Iluminaras Suite</title>
  <style>
    body{ font-family: Arial, Helvetica, sans-serif; margin:0; background:#f7f7f7; }
    .wrap{ max-width:420px; margin: 8vh auto; padding: 0 14px; }
    .card{ background:#fff; border:1px solid #e6e6e6; border-radius:12px; padding:16px; }
    input{ width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid #cfcfcf; border-radius:10px; font-size:14px; }
    label{ font-size:12px; color:#333; display:block; margin: 10px 0 4px; }
    .btn{ width:100%; padding:10px 12px; border-radius:10px; border:1px solid #111; background:#111; color:#fff; cursor:pointer; font-weight:700; margin-top:12px; }
    a{ font-size:13px; }
    .msg{ padding:10px 12px; border-radius:10px; margin:10px 0; }
    .msg.error{ background:#ffe9e9; border:1px solid #ffb6b6; }
    .msg.info{ background:#e9f1ff; border:1px solid #b6d0ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2 style="margin:0 0 6px 0;">Restablecer contraseña</h2>
      <div style="font-size:13px;color:#555;margin-bottom:10px;">Te enviamos un link por email (si está configurado SMTP).</div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="msg {{ cat }}">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post" action="{{ url_for('auth.request_reset_post') }}">
        <label>Email</label>
        <input name="email" type="email" autocomplete="email" required />
        <button class="btn" type="submit">Enviar link</button>
      </form>
      <div style="margin-top:10px;">
        <a href="{{ url_for('auth.login') }}">Volver al login</a>
      </div>
    </div>
  </div>
</body>
</html>
